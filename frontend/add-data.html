<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Data - Health Monitoring System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Health Monitor</h2>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="add-data.html" class="active">Add Health Data</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <div class="logout-btn">
            <a onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Add Health Data</h1>
        </div>

        <div class="form-card">
            <form id="add-data-form">
                <div class="form-group">
                    <label for="heart_rate">Heart Rate (bpm)</label>
                    <input type="number" id="heart_rate" required>
                </div>
                <div class="form-group">
                    <label for="steps">Steps</label>
                    <input type="number" id="steps" required>
                </div>
                <div class="form-group">
                    <label for="sleep_hours">Sleep (hours)</label>
                    <input type="number" step="0.1" id="sleep_hours" required>
                </div>
                <div class="form-group">
                    <label for="calories">Calories</label>
                    <input type="number" id="calories" required>
                </div>
                <button type="submit" class="btn">Save Data</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
