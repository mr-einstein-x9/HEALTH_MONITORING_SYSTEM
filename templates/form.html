{% extends "base.html" %}
{% block content %}
<div class="form-wrapper">
    <div class="glass-card form-card">
        <h2>{{ title }}</h2>
        <form method="POST">
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required 
                       value="{{ log.date if log else '' }}" 
                       id="dateInput">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>Steps</label>
                    <input type="number" name="steps" min="0" step="1" 
                           value="{{ log.steps if log else '' }}" placeholder="Enter steps">
                </div>
                
                <div class="form-group">
                    <label>Sleep (Hours)</label>
                    <input type="number" name="sleep_hours" min="0" max="24" step="0.1" 
                           value="{{ log.sleep_hours if log else '' }}" placeholder="Enter hours">
                </div>

                <div class="form-group">
                    <label>BP Systolic (mmHg)</label>
                    <input type="number" name="bp_systolic" min="50" max="250" 
                           value="{{ log.bp_systolic if log else '' }}" placeholder="Enter systolic">
                </div>

                <div class="form-group">
                    <label>BP Diastolic (mmHg)</label>
                    <input type="number" name="bp_diastolic" min="30" max="150" 
                           value="{{ log.bp_diastolic if log else '' }}" placeholder="Enter diastolic">
                </div>

                <div class="form-group">
                    <label>Heart Rate (bpm)</label>
                    <input type="number" name="heart_rate" min="30" max="220" 
                           value="{{ log.heart_rate if log else '' }}" placeholder="Enter bpm">
                </div>

                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" name="weight" min="0" step="0.1" 
                           value="{{ log.weight if log else '' }}" placeholder="Enter weight">
                </div>

                <div class="form-group">
                    <label>Water Intake (Liters)</label>
                    <input type="number" name="water_intake" min="0" step="0.1" 
                           value="{{ log.water_intake if log else '' }}" placeholder="Enter liters">
                </div>
            </div>

            <div class="form-actions mt-3 button-group">
                <button type="submit" class="btn-primary w-100">Save Data</button>
                <a href="{{ url_for('dashboard') }}" class="btn-outline w-100 text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Set default date to today if creating new
    if (!document.getElementById('dateInput').value) {
        document.getElementById('dateInput').valueAsDate = new Date();
    }
</script>
{% endblock %}
